<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>现代五子棋</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        h1 {
            font-size: 2.8rem;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .status {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 15px 0;
            padding: 10px 20px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            border: 1px solid #475569;
            min-width: 300px;
            text-align: center;
        }
        .current-player {
            color: #60a5fa;
        }
        .board-container {
            position: relative;
            margin: 20px 0;
        }
        canvas {
            display: block;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 25px;
        }
        button {
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }
        button:active { transform: translateY(0); }
        #undoBtn { background: linear-gradient(135deg, #f59e0b, #d97706); }
        #restartBtn { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            border: 1px solid #475569;
            animation: pop 0.4s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal h2 {
            font-size: 2.8rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #10b981, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .modal p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: #cbd5e1;
        }
        .modal button {
            background: linear-gradient(135deg, #10b981, #059669);
            font-size: 1.2rem;
            padding: 15px 40px;
        }
        .stone {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            box-shadow: 
                inset 0 -8px 15px rgba(0,0,0,0.4),
                inset 0 8px 15px rgba(255,255,255,0.2),
                0 10px 20px rgba(0,0,0,0.5);
        }
        .black-stone {
            background: radial-gradient(circle at 30% 30%, #333, #000);
        }
        .white-stone {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>五子棋</h1>
        <div class="status">当前玩家: <span class="current-player">黑棋</span></div>
    </div>
    <div class="board-container">
        <canvas id="boardCanvas" width="600" height="600"></canvas>
    </div>
    <div class="controls">
        <button id="undoBtn">悔棋</button>
        <button id="restartBtn">重新开始</button>
    </div>
    <div id="winModal" class="modal">
        <div class="modal-content">
            <h2>游戏结束</h2>
            <p id="winMessage">黑棋获胜！</p>
            <button id="newGameBtn">新游戏</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('boardCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.querySelector('.status .current-player');
        const undoBtn = document.getElementById('undoBtn');
        const restartBtn = document.getElementById('restartBtn');
        const winModal = document.getElementById('winModal');
        const winMessage = document.getElementById('winMessage');
        const newGameBtn = document.getElementById('newGameBtn');

        const BOARD_SIZE = 15;
        const CELL_SIZE = canvas.width / (BOARD_SIZE + 1);
        const STONE_RADIUS = CELL_SIZE * 0.4;
        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let currentPlayer = 1;
        let gameOver = false;
        let moveHistory = [];

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#d2691e';
            for(let i = 0; i < 10; i++) {
                ctx.fillRect(i*2, i*2, canvas.width - i*4, canvas.height - i*4);
            }
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < BOARD_SIZE; i++) {
                const pos = (i + 1) * CELL_SIZE;
                ctx.beginPath();
                ctx.moveTo(CELL_SIZE, pos);
                ctx.lineTo(canvas.width - CELL_SIZE, pos);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(pos, CELL_SIZE);
                ctx.lineTo(pos, canvas.height - CELL_SIZE);
                ctx.stroke();
            }
            const dots = [3, 7, 11];
            dots.forEach(i => dots.forEach(j => {
                ctx.beginPath();
                ctx.arc((i+1)*CELL_SIZE, (j+1)*CELL_SIZE, 5, 0, Math.PI*2);
                ctx.fillStyle = '#000';
                ctx.fill();
            }));
            drawStones();
        }

        function drawStones() {
            document.querySelectorAll('.stone').forEach(s => s.remove());
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] !== 0) {
                        const stone = document.createElement('div');
                        stone.className = `stone ${board[r][c] === 1 ? 'black-stone' : 'white-stone'}`;
                        const x = (c + 1) * CELL_SIZE;
                        const y = (r + 1) * CELL_SIZE;
                        stone.style.width = `${STONE_RADIUS * 2}px`;
                        stone.style.height = `${STONE_RADIUS * 2}px`;
                        stone.style.left = `${canvas.offsetLeft + x - STONE_RADIUS}px`;
                        stone.style.top = `${canvas.offsetTop + y - STONE_RADIUS}px`;
                        document.body.appendChild(stone);
                    }
                }
            }
        }

        function placeStone(row, col) {
            if (gameOver || board[row][col] !== 0) return;
            board[row][col] = currentPlayer;
            moveHistory.push({row, col, player: currentPlayer});
            drawStones();
            if (checkWin(row, col)) {
                gameOver = true;
                winMessage.textContent = `${currentPlayer === 1 ? '黑棋' : '白棋'}获胜！`;
                winModal.style.display = 'flex';
            } else {
                currentPlayer = 3 - currentPlayer;
                statusText.textContent = currentPlayer === 1 ? '黑棋' : '白棋';
                statusText.style.color = currentPlayer === 1 ? '#60a5fa' : '#f1f5f9';
            }
        }

        function checkWin(row, col) {
            const dirs = [[1,0],[0,1],[1,1],[1,-1]];
            for (let [dx, dy] of dirs) {
                let count = 1;
                for (let sign = -1; sign <= 1; sign += 2) {
                    for (let step = 1; step <= 4; step++) {
                        const nr = row + dx * step * sign;
                        const nc = col + dy * step * sign;
                        if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE || board[nr][nc] !== currentPlayer) break;
                        count++;
                    }
                }
                if (count >= 5) return true;
            }
            return false;
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const col = Math.round(x / CELL_SIZE) - 1;
            const row = Math.round(y / CELL_SIZE) - 1;
            if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) {
                placeStone(row, col);
            }
        });

        undoBtn.addEventListener('click', () => {
            if (moveHistory.length === 0 || gameOver) return;
            const last = moveHistory.pop();
            board[last.row][last.col] = 0;
            currentPlayer = last.player;
            statusText.textContent = currentPlayer === 1 ? '黑棋' : '白棋';
            statusText.style.color = currentPlayer === 1 ? '#60a5fa' : '#f1f5f9';
            drawStones();
        });

        restartBtn.addEventListener('click', resetGame);
        newGameBtn.addEventListener('click', () => {
            winModal.style.display = 'none';
            resetGame();
        });

        function resetGame() {
            board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            currentPlayer = 1;
            gameOver = false;
            moveHistory = [];
            statusText.textContent = '黑棋';
            statusText.style.color = '#60a5fa';
            drawBoard();
        }

        window.addEventListener('resize', drawBoard);
        drawBoard();
    </script>
</body>
</html>
